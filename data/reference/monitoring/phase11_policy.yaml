sla:
  freshness_hours_max: 72
  missing_zone_records_critical: 1

drift:
  stress_index_warn: 0.35
  stress_index_critical: 0.70
  renewable_share_warn: 0.25
  renewable_share_critical: 0.50

alert_routing:
